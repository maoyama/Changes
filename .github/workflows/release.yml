name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
jobs:
  build:
    name: Release
    permissions:
      contents: write
      pull-requests: write
    runs-on: macos-26
    steps:
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Install the Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
      - name: Archive App
        run: |
          xcodebuild -scheme GitClient -configuration Release -archivePath Changes.xcarchive archive
      - name: Export App
        run: |
          xcodebuild -exportArchive -archivePath Changes.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath Changes
      - name: Create ZIP Archive
        run: |
          ditto -c -k --keepParent Changes/Changes.app Changes.zip
      - name: Notarize App
        env:
          AC_USERNAME: ${{ secrets.AC_USERNAME }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
        run: |
          xcrun notarytool submit Changes.zip --apple-id "$AC_USERNAME" --password "$AC_PASSWORD" --team-id JRA6VW2DG4 --wait
      - name: Generate SHA256 Checksum
        run: |
          shasum -a 256 Changes.zip > Checksum.txt
          echo "SHA256 Checksum: $(cat Checksum.txt)" >> $GITHUB_STEP_SUMMARY
      - name: Sign Update with Sparkle
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          SPARKLE_CHECKOUT="${HOME}/Library/Developer/Xcode/DerivedData/GitClient-*/SourcePackages/checkouts/Sparkle"
          SPARKLE_DIR=$(ls -d $SPARKLE_CHECKOUT 2>/dev/null | head -1)
          if [ -z "$SPARKLE_DIR" ]; then
            echo "Building to resolve Sparkle package..."
            xcodebuild build -scheme GitClient -configuration Release -derivedDataPath DerivedData 2>/dev/null || true
            SPARKLE_DIR=$(ls -d DerivedData/SourcePackages/checkouts/Sparkle 2>/dev/null | head -1)
          fi
          SIGN_UPDATE="$SPARKLE_DIR/bin/sign_update"
          if [ ! -f "$SIGN_UPDATE" ]; then
            echo "Downloading Sparkle tools..."
            curl -sL https://github.com/sparkle-project/Sparkle/releases/latest/download/Sparkle-2.7.5.tar.xz | tar xJ -C /tmp
            SIGN_UPDATE="/tmp/bin/sign_update"
          fi
          SIGNATURE=$("$SIGN_UPDATE" Changes.zip --ed-key-file <(echo "$SPARKLE_EDDSA_PRIVATE_KEY") 2>&1)
          echo "SPARKLE_SIGNATURE<<EOF" >> "$GITHUB_ENV"
          echo "$SIGNATURE" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          echo "Sparkle signature generated" >> "$GITHUB_STEP_SUMMARY"
      - name: Generate Appcast Entry
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG_NAME#v}"
          FILE_SIZE=$(stat -f%z Changes.zip)
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG_NAME}/Changes.zip"
          cat > appcast.xml << 'APPCAST_HEADER'
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/" version="2.0">
            <channel>
              <title>Changes</title>
          APPCAST_HEADER
          cat >> appcast.xml << APPCAST_ITEM
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>$(date -R)</pubDate>
                <enclosure url="${DOWNLOAD_URL}" length="${FILE_SIZE}" type="application/octet-stream" ${SPARKLE_SIGNATURE} />
              </item>
          APPCAST_ITEM
          cat >> appcast.xml << 'APPCAST_FOOTER'
            </channel>
          </rss>
          APPCAST_FOOTER
          sed -i '' 's/^          //' appcast.xml
      - name: Deploy Appcast to GitHub Pages
        run: |
          mkdir -p gh-pages-deploy
          cp appcast.xml gh-pages-deploy/
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-deploy
          publish_branch: gh-pages
          keep_files: true
      - name: Upload Assets to Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            Changes.zip
            Checksum.txt
            appcast.xml
          draft: true
          generate_release_notes: true
